<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or "DataWave" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
</head>
<body>

<header>
    <a href="{{ url_for('index') }}" class="brand">
        <div class="brand-icon">&#9875;</div>
        DataWave
    </a>
    <nav>
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('ships_page') }}">Ships</a>
        <a href="{{ url_for('logout') }}" class="nav-logout">Logout</a>
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <span class="footer-brand">DataWave</span>
    <span>Real-time water monitoring &mdash; rivers, lakes &amp; seas</span>
</footer>

</body>
</html>
